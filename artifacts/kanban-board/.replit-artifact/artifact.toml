kind = "web"
previewPath = "/"
title = "GitHub Issues Kanban Board"
version = "1.0.0"
id = "artifacts/kanban-board"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22152

[services.development]
run = "pnpm --filter @workspace/kanban-board run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kanban-board", "run", "build" ]
publicDir = "artifacts/kanban-board/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22152"
BASE_PATH = "/"
